apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.musickit.network"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdk rootProject.ext.minSdkVersion
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // compileOnly: the consuming app already provides react-android at
    // runtime; keeping this compileOnly avoids classpath duplication so
    // this module can be dropped into any RN 0.81+ New Architecture app.
    compileOnly("com.facebook.react:react-android")

    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")
}
