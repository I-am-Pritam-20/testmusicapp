name: Debug APK Build

# ── Triggers only when native code or dependencies change ─────────────────────
# JS-only changes do NOT trigger a build — Metro hot reload handles those.
on:
  push:
    branches:
      - dev
    paths:
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Read version ──────────────────────────────────────────────────────
      - name: Read version
        run: |
          VERSION_NAME=$(node -p "require('./version.json').versionName")
          VERSION_CODE=$(node -p "require('./version.json').versionCode")
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "Version: ${VERSION_NAME} (build ${VERSION_CODE})"

      # ── 3. Setup Java 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Setup Node 20 ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. Install JS dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Inject version ────────────────────────────────────────────────────
      - name: Inject version into build.gradle
        run: |
          sed -i "s/versionCode .*/versionCode ${{ env.VERSION_CODE }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ env.VERSION_NAME }}\"/" android/app/build.gradle
          echo "Injected: ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }})"

      # ── 8. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode=none \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 9. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="debug-v${{ env.VERSION_NAME }}-${DATE}-${SHORT_SHA}.apk"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/${APK_NAME}
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "Built: ${APK_NAME}"

      # ── 10. Upload artifact (expires in 1 day) ───────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 1

      # ── 11. Clean everything ─────────────────────────────────────────────────
      - name: Clean caches and build outputs
        if: always()
        run: |
          cd android && ./gradlew clean --no-daemon 2>/dev/null || true
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf node_modules
          echo "All Gradle caches, build outputs, and node_modules removed"

      # ── 12. Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "### Debug APK Built" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.VERSION_NAME }}\` (build \`${{ env.VERSION_CODE }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| Expires | 1 day |" >> $GITHUB_STEP_SUMMARY